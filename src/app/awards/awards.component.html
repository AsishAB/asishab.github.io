<section class="card border-0 shadow-sm p-4 mb-4">
    <div class="d-flex align-items-center gap-2 mb-4 pb-2 border-bottom">
        <lucide-angular [img]="Cloud" size="20" class="text-primary"></lucide-angular>
        <h2 class="h5 fw-bold text-dark mb-0 text-uppercase">Awards</h2>
    </div>
    <div *ngFor="let award of awards" class="space-y-3">
        <div class="d-flex align-items-start gap-3 mb-3">
            <lucide-angular [img]="trophy" size="14" class="text-primary mt-1"></lucide-angular>
            <div>
                <!-- <p class="small fw-bold text-dark mb-0">{{ award }}</p> -->
                 <p class="small text-muted mb-0">{{ award }}</p>
            </div>
        </div>

    </div>
</section>
