
<section id="skills" class="card border-0 shadow-sm p-4 mb-4">
    <div class="d-flex align-items-center gap-2 mb-4 pb-2 border-bottom">
        <lucide-angular [img]="Award" size="20" class="text-primary"></lucide-angular>
        <h2 class="h5 fw-bold text-dark mb-0 text-uppercase">Skills & Tools</h2>
    </div>
    <div class="space-y-4">
        <div class="mb-4">
        <h4 class="small fw-bold text-uppercase text-muted mb-3 tracking-widest">Cloud</h4>
        <div class="d-flex flex-wrap gap-2">
            <span class="badge bg-primary text-white py-1 px-2">AWS</span>
            <span class="badge bg-light text-muted border py-1 px-2">Snowflake</span>
            <span class="badge bg-light text-muted border py-1 px-2">Databricks</span>
        </div>
        </div>
        <div class="mb-4">
        <h4 class="small fw-bold text-uppercase text-muted mb-3 tracking-widest">Programming</h4>
        <div class="d-flex flex-wrap gap-2">
            <span class="badge bg-light text-muted border py-1 px-2">Python</span>
            <span class="badge bg-light text-muted border py-1 px-2">Node JS</span>
            <span class="badge bg-light text-muted border py-1 px-2">Flask</span>
            <span class="badge bg-light text-muted border py-1 px-2">Angular</span>
        </div>
        </div>
        <div class="mb-4">
        <h4 class="small fw-bold text-uppercase text-muted mb-3 tracking-widest">Databases (SQL and NoSQL)</h4>
        <div class="d-flex flex-wrap gap-2">
            <span class="badge bg-light text-muted border py-1 px-2">MySQL</span>
            <span class="badge bg-light text-muted border py-1 px-2">MongoDB</span>
        </div>
        </div>
        <div>
        <h4 class="small fw-bold text-uppercase text-muted mb-3 tracking-widest">CI/CD and Other Tools</h4>
        <div class="d-flex flex-wrap gap-2">
            <span class="badge bg-light text-muted border py-1 px-2">Jenkins</span>
            <span class="badge bg-light text-muted border py-1 px-2">GitHub Actions</span>
            <span class="badge bg-light text-muted border py-1 px-2">Git</span>
        </div>
        </div>
    </div>
</section>
