<!-- Hero Header -->
<header class="bg-white border-bottom py-5 mb-5">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-8">
        <h1 class="display-4 fw-bold text-dark mb-2">Asish Bishoi</h1>
        <p class="h4 text-primary fw-semibold mb-4">Associate Consultant at Infosys</p>
        <div class="d-flex flex-wrap gap-4 text-muted small">
          <span class="d-flex align-items-center gap-2">
            <lucide-angular [img]="Mail" size="16"></lucide-angular> asish.bishoi&#64;gmail.com
          </span>
          <span class="d-flex align-items-center gap-2">
            <lucide-angular [img]="MapPin" size="16"></lucide-angular> Bangalore, Karnataka, India
          </span>
          <span class="d-flex align-items-center gap-2 fw-bold text-dark">
            <lucide-angular [img]="Briefcase" size="16"></lucide-angular> {{totalExperience}} Years Experience
          </span>
        </div>
      </div>
      <div class="col-lg-4 mt-4 mt-lg-0 d-flex gap-3 justify-content-lg-end">
        <div class="bg-light border rounded p-3 text-center min-width-120">
          <p class="text-uppercase x-small fw-bold text-muted mb-1">AWS Status</p>
          <p class="text-primary fw-bold mb-0">Certified</p>
        </div>
        <div class="bg-light border rounded p-3 text-center min-width-120">
          <p class="text-uppercase x-small fw-bold text-muted mb-1">MongoDB</p>
          <p class="text-primary fw-bold mb-0">Associate</p>
        </div>
      </div>
    </div>
  </div>
</header>
