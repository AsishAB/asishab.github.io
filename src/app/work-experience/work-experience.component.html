
      <!-- Work Experience -->
      <section id="experience" class="card border-0 shadow-sm p-4 mb-4">
        <div class="d-flex align-items-center gap-2 mb-4 pb-2 border-bottom">
          <lucide-angular [img]="Briefcase" size="20" class="text-primary"></lucide-angular>
          <h2 class="h5 fw-bold text-dark mb-0 text-uppercase">Work Experience</h2>
        </div>
        <div class="timeline">
          <div *ngFor="let exp of experiences" class="timeline-item pb-5 position-relative ps-4 border-start border-2 border-light">
            <div class="timeline-dot position-absolute start-0 top-0 translate-middle-x bg-white border border-primary border-4 rounded-circle" style="width: 16px; height: 16px;"></div>
            <div class="d-flex flex-column flex-md-row justify-content-between mb-3">
              <div>
                <h3 class="h6 fw-bold text-dark mb-0">{{exp.company}}</h3>
                <p class="text-primary fw-semibold small mb-0">{{exp.role}}</p>
              </div>
              <span class="x-small fw-bold text-muted text-uppercase mt-1">{{ exp.startDate | date:'dd MMM yyyy' }} - {{ exp.endDate ? (exp.endDate | date:'dd MMM yyyy') : 'Present' }}</span>
            </div>
            <ul class="list-unstyled small text-muted mb-3">
              <li *ngFor="let desc of exp.description" class="mb-2">• {{desc}}</li>
            </ul>
            <div *ngIf="exp.cloudServices" class="d-flex flex-wrap gap-2">
              <span *ngFor="let service of exp.cloudServices" class="badge bg-light text-muted border small py-1 px-2 fw-bold text-uppercase">{{service}}</span>
            </div>
          </div>
        </div>
      </section>
