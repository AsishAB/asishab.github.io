<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Asish Bishoi | Professional Profile</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // This script handles SPA routing for GitHub Pages
    // When user navigates directly to a route (e.g., /old), 
    // GitHub Pages tries to find /old.html and fails with 404.
    // This script captures that and redirects to index.html
    // which lets Angular's router handle the routing.
    
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
  <script src="runtime.js" type="module"></script>
  <script src="polyfills.js" type="module"></script>
  <script src="styles.js" type="module"></script>
  <script src="main.js" type="module"></script>
</body>
</html>
